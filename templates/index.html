<div class="roster-panel">

<form action="/upload_roster" method="post" enctype="multipart/form-data">

<input type="file" name="roster">

<button>Upload Roster</button>

</form>

{% if roster_time %}

<div class="roster-info">

Roster uploaded successfully<br>
Upload Time : {{roster_time}}

</div>

<a href="/delete_roster" class="delete-btn">Delete Roster</a>

{% endif %}

</div>


<div class="actions">

<a href="/export_excel" class="btn">Export Excel</a>

<a href="/reset" class="reset-btn">Reset Report</a>

</div>
